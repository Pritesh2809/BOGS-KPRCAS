<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Supporting Portfolio Links</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #eef2ff, #dbeafe);
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h2 {
            font-size: 28px;
            color: #1e293b;
            margin-bottom: 25px;
        }

        .link-btn {
            display: inline-block;
            padding: 14px 24px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            transition: 0.3s ease;
            box-shadow: 0 6px 18px rgba(37, 99, 235, 0.25);
        }

        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 22px rgba(37, 99, 235, 0.35);
        }

        p {
            margin-top: 15px;
            color: #64748b;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Sample Edited Files</h2>

    <a class="link-btn"
       href="https://drive.google.com/drive/folders/1sBTirjD36uSM-ibhVrxiK7gyg6-BvWlj?usp=sharing"
       target="_blank">
        View Edited Photos / Media Work
    </a>

    <p>Opens in a new tab ↗</p>
</div>

</body>
</html>
